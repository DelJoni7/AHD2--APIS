<h2> Todos </h2>

<p> Total de Todos: {{todos().length}} </p>

<table>
    <thead>
        <tr>
            <th> ID</th>
            <th> Título </th>
            <th> Completado</th>
        </tr>
    </thead>
    <tbody>
        @for (todo of todos(); track todo.id){
            <tr>
                <td>{{todo.id}}</td>
                <td>{{todo.title}}</td>
                <td>{{todo.completed}}</td>
            </tr>

        } 
    </tbody>
</table>
